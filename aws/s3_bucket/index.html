<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>S3 File Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e5e7eb;
    }
    .box {
      background: #020617;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 20px 45px rgba(15,23,42,0.7);
      max-width: 420px;
      width: 100%;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      text-align: center;
    }
    p {
      margin: 0 0 18px;
      font-size: 0.9rem;
      color: #9ca3af;
      text-align: center;
    }
    form {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border-radius: 9999px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.95rem;
      outline: none;
    }
    input[type="text"]::placeholder {
      color: #6b7280;
    }
    input[type="text"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px #38bdf8;
    }
    button {
      padding: 10px 16px;
      border-radius: 9999px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>S3 File Search</h1>
    <p>Type a path or filename and press Enter or click Go.</p>

    <form id="search-form">
      <input
        type="text"
        id="search-input"
        placeholder="example-folder/report.pdf"
        autocomplete="off"
      />
      <button type="submit">Go</button>
    </form>
  </div>

  <script>
    (function () {
      var form = document.getElementById("search-form");
      var input = document.getElementById("search-input");

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        var value = (input.value || "").trim();
        if (!value) return;

        // Remove leading slashes so we don't end up with "//path"
        value = value.replace(/^\/+/, "");

        // Redirect to "/{text-typed}"
        window.location.href = "/" + encodeURI(value);
      });
    })();
  </script>
</body>
</html>
