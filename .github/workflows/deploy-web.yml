name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - "turborepo/apps/web/**"
      - "turborepo/packages/**"
      - ".github/workflows/deploy-web.yml"

concurrency:
  group: deploy-web-prod
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: turborepo

    env:
      AWS_REGION: sa-east-1
      S3_BUCKET: tsr-codedeploy-revisions-581483106640-sa-east-1-an
      CODEDEPLOY_APP: tsr-web
      CODEDEPLOY_GROUP: tsr-web-prod
      ARTIFACT_NAME: web-${{ github.sha }}.tar.gz
      WEB_API_URL: ${{ secrets.WEB_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: turborepo/pnpm-lock.yaml

      - name: Show pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm --filter ./apps/web lint

      - name: Run typecheck
        run: pnpm --filter ./apps/web check-types

      - name: Execute tests
        run: pnpm --filter ./apps/web test:run

      - name: Create web runtime env
        run: |
          if [ -z "${WEB_API_URL}" ]; then
            echo "WEB_API_URL secret is required"
            exit 1
          fi

          cat > apps/web/.env.production <<EOF
          API_URL=${WEB_API_URL}
          EOF

      - name: Build web
        run: pnpm --filter ./apps/web build

      - name: Prepare deploy folder
        run: |
          rm -rf .deploy/web
          mkdir -p .deploy/web/apps/web

          pnpm --filter ./apps/web --prod deploy .deploy/web/apps/web

          mkdir -p .deploy/web/apps/web/public
          if [ -d apps/web/public ]; then
            cp -R apps/web/public/. .deploy/web/apps/web/public/
          fi

          if [ -f apps/web/.env.production ]; then
            cp apps/web/.env.production .deploy/web/apps/web/.env.production
          fi

          mkdir -p .deploy/web/apps/web/.next
          rsync -a \
            --exclude 'standalone' \
            --exclude 'cache' \
            apps/web/.next/ .deploy/web/apps/web/.next/

          cp apps/web/deployment/appspec.yml .deploy/web/appspec.yml
          cp apps/web/deployment/ecosystem.config.cjs .deploy/web/ecosystem.config.cjs

          mkdir -p .deploy/web/scripts
          cp apps/web/deployment/scripts/* .deploy/web/scripts/

      - name: Inspect deploy folder
        run: |
          find .deploy/web -maxdepth 4 | sort
          test -f .deploy/web/appspec.yml
          test -f .deploy/web/apps/web/package.json
          test -f .deploy/web/apps/web/.env.production
          test -f .deploy/web/apps/web/.next/BUILD_ID
          test -f .deploy/web/ecosystem.config.cjs

      - name: Create tarball
        run: |
          cd .deploy/web
          tar -czf ../${ARTIFACT_NAME} .

      - name: Verify extracted artifact runs on Linux
        run: |
          rm -rf /tmp/tsr-web-smoke
          mkdir -p /tmp/tsr-web-smoke
          tar -xzf .deploy/${ARTIFACT_NAME} -C /tmp/tsr-web-smoke
          cd /tmp/tsr-web-smoke/apps/web
          HOSTNAME=127.0.0.1 node node_modules/next/dist/bin/next start -p 3100 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 10
          curl -I http://127.0.0.1:3100

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: arn:aws:iam::581483106640:role/GitHubActionsDeployRole-TSR
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        run: aws s3 cp .deploy/${ARTIFACT_NAME} s3://${S3_BUCKET}/${ARTIFACT_NAME}

      - name: Create deployment
        run: |
          aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP}" \
            --deployment-group-name "${CODEDEPLOY_GROUP}" \
            --s3-location bucket=${S3_BUCKET},bundleType=tgz,key=${ARTIFACT_NAME}
